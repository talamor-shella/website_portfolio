<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="assets/mylogo.png" alt="Logo">
        </div>
        <nav>
            <a href="index.html">HOME</a>
            <a href="about_me.html">ABOUT ME</a>
            <a href="portfolio.html" class="active">PORTFOLIO</a>
        </nav>
    </header>

    <div class="portfolio-page-container">

        <div class="portfolio-carousel-section">
            
            <button class="nav-arrow left-arrow">
                <img src="assets/arrow-left.png" alt="Previous">
            </button>

            <div class="cards-grid-wrapper">
                
                <!-- Card 1: Before -->
                <div class="document-card">
                    <div class="paper-image-holder">
                        <img src="assets/paper.png" alt="Paper Document" class="paper-img">
                        <span class="inner-paper-text">BEFORE</span>
                    </div>
                    <span class="document-sub-label">OJT_Before</span>
                </div>

                <!-- Card 2: During -->
                <div class="document-card">
                    <div class="paper-image-holder">
                        <img src="assets/paper.png" alt="Paper Document" class="paper-img">
                        <span class="inner-paper-text">DURING</span>
                    </div>
                    <span class="document-sub-label">OJT_During</span>
                </div>

                <!-- Card 3: After -->
                <div class="document-card">
                    <div class="paper-image-holder">
                        <img src="assets/paper.png" alt="Paper Document" class="paper-img">
                        <span class="inner-paper-text">AFTER</span>
                    </div>
                    <span class="document-sub-label">OJT_After</span>
                </div>

            </div>

            <button class="nav-arrow right-arrow">
                <img src="assets/arrow-right.png" alt="Next">
            </button>

        </div>

        <div class="bottom-folder-navigation">
            <a href="#" class="portfolio-back-folder">
                <div class="folder-icon-box">
                    <img src="assets/folder.png" alt="Folder Icon">
                </div>
                <span class="folder-label-text">PORTFOLIO</span>
            </a>
        </div>

        <div class="social-links">
            <a href="https://linkedin.com" target="_blank">
                <img src="assets/linkedin_logo.png" alt="LinkedIn">
            </a>
            <a href="https://github.com" target="_blank">
                <img src="assets/github_logo.png" alt="GitHub">
            </a>
        </div>

    </div>

</body>
</html>
